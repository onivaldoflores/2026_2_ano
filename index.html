<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horas Complementares - IFPR</title>
    <link rel="stylesheet" href="estilo/estiloConfig.css">
    <link rel="stylesheet" href="estilo/estiloLogin.css">
</head>
<body>
    <main>
        <form action="#" method="post">
            <h1>LOGIN</h1>
            <p>Acesse o sistema e gerencie suas horas complementares</p>
            <input type="text" name="login" class="campoLogin" placeholder="Digite seu login" required>
            <input type="password" name="senha" class="campoLogin" placeholder="Digite sua senha" required>
            <fieldset>
                <legend>Eu sou:</legend>
                <input type="radio" name="tipoPerfil" id="aluno" value="aluno">
                <label for="aluno">Aluno</label>
                <input type="radio" name="tipoPerfil" id="coordenador" value="coordenador">
                <label for="coordenador">Coordenador</label>
            </fieldset>
            <button type="submit" class="btnLogin" name="entrar" value="entrar">ENTRAR</button>
        </form>
    </main>    
    
</body>
</html>
